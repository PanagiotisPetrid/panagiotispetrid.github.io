<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ASTRO 3D Engine</title>
    <style>
        /* Locks the engine to the size of the iframe window */
        body { margin: 0; overflow: hidden; background-color: transparent; }
        #webgl-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        
        /* The Hologram Fade Effect */
        #webgl-container {
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 90%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 90%, transparent 100%);
        }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>
    <div id="webgl-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const container = document.getElementById('webgl-container');
        let width = window.innerWidth;
        let height = window.innerHeight;

        const scene = new THREE.Scene();
        const gridHelper = new THREE.GridHelper(100, 100, 0x00FF00, 0x00FF00);
        scene.add(gridHelper);

        const camera = new THREE.PerspectiveCamera(45, width / height, 0.001, 100000);
        camera.position.set(10, 10, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(width, height);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enableZoom = false;

        const parts = [];
        let modelBaseSize = 1;
        let currentProgress = 0; // Starts at 0 (fully exploded)

        // LOAD THE MODEL (Using relative path on GitHub)
        const loader = new GLTFLoader();
        loader.load('./astro-telescope-final.glb', (gltf) => {
            const model = gltf.scene;
            
            const box = new THREE.Box3().setFromObject(model);
            const size = new THREE.Vector3();
            box.getSize(size);
            const center = new THREE.Vector3();
            box.getCenter(center);

            const maxDim = Math.max(size.x, size.y, size.z);
            modelBaseSize = maxDim > 0 ? maxDim : 1;

            model.position.x = -center.x;
            model.position.y = -center.y;
            model.position.z = -center.z;

            camera.position.set(maxDim * 1.5, maxDim * 1.0, maxDim * 1.5);
            camera.lookAt(0, 0, 0);
            controls.target.set(0, 0, 0);
            controls.update();

            gridHelper.scale.set(modelBaseSize/10, modelBaseSize/10, modelBaseSize/10);

            const wireMat = new THREE.MeshBasicMaterial({
                color: 0x00FFFF,
                wireframe: true,
                transparent: true,
                opacity: 0.6
            });

            model.traverse((child) => {
                if (child.isMesh) {
                    child.material = wireMat;
                    parts.push({
                        mesh: child,
                        originalY: child.position.y,
                        name: child.name
                    });
                }
            });

            scene.add(model);
        });

        // Add a floating text label to display progress (for debugging)
        const debugLabel = document.createElement('div');
        debugLabel.style.position = 'absolute';
        debugLabel.style.bottom = '20px';
        debugLabel.style.left = '20px';
        debugLabel.style.color = '#FFCC00';
        debugLabel.style.fontFamily = 'monospace';
        debugLabel.style.fontSize = '24px';
        debugLabel.style.background = 'rgba(0,0,0,0.7)';
        debugLabel.style.padding = '10px 20px';
        debugLabel.style.borderRadius = '8px';
        debugLabel.style.zIndex = '100';
        debugLabel.textContent = 'Waiting for scroll...';
        document.body.appendChild(debugLabel);
        
        // Listen for scroll messages
        window.addEventListener('message', (event) => {
            // Log to console
            console.log('Message received:', event.data);
            
            if (event.data.type === 'scrollSync') {
                const progress = parseFloat(event.data.progress);
                if (!isNaN(progress)) {
                    // Update the debug label
                    debugLabel.textContent = `Scroll Progress: ${(progress * 100).toFixed(1)}%`;
                    
                    // YOUR EXISTING LOGIC TO UPDATE THE ANIMATION
                    // Assuming your variable is called 'currentProgress'
                    window.currentProgress = progress; 
                    
                    // If you are using a THREE.js mixer, set the time directly:
                    // if (mixer && clip) mixer.setTime(progress * clip.duration);
                }
            }
        });

// Also, try to request the progress immediately when the iframe loads
window.parent.postMessage({ type: 'iframeReady' }, '*');

        function animate() {
            requestAnimationFrame(animate);

            // Calculate explosion based on the progress beamed in from WordPress
            const explosionFactor = (1.0 - currentProgress) * (modelBaseSize * 0.6);

            parts.forEach((part) => {
                if      (part.name === 'Dish_Outer') part.mesh.position.y = part.originalY + (explosionFactor * 2.5);
                else if (part.name === 'Dish_Inner') part.mesh.position.y = part.originalY + (explosionFactor * 1.8);
                else if (part.name === 'Dish_Plate') part.mesh.position.y = part.originalY + (explosionFactor * 1.2);
                else if (part.name === 'Body')       part.mesh.position.y = part.originalY + (explosionFactor * 0.5);
            });

            scene.rotation.y += 0.002;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        });
    </script>
</body>
</html>
